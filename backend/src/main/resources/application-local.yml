spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cinema_ebooking_db?serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_LOCAL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update

# ================== AI SERVICE CONFIG ==================
ai:
  service:
    url: http://localhost:8081/api/v1/ai/analyze
    enabled: true
    timeout-connect: 5000
    timeout-read: 10000