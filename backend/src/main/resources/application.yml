spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: cinema-ebooking

  profiles:
    active: local  # mặc định chạy local

  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
  # ================== HIKARI CONNECTION POOL ==================
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000
      connection-timeout: 30000
      max-lifetime: 1800000

# ================== LOGGING ==================
logging:
  level:
    com.zaxxer.hikari: INFO
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.flywaydb: DEBUG   # THÊM
    org.springframework.boot.autoconfigure.flyway: DEBUG  # THÊM

# ================== JWT VARIABLES ==================
jwt:
  secret: my-secret-key-my-secret-key-my-secret-key-123456   # ⚠️ đổi thành biến môi trường khi production
  access:
    expiration: 900000      # 15 phút (miligiây)
  refresh:
    expiration: 604800000   # 7 ngày